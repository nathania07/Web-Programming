<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Page Layout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }

        /* --- Table Styling --- */
        table {
            border-collapse: collapse;
            width: 300px;
            background-color: white;
            border: 2px solid #555;
        }

        th, td {
            border: 1px solid #555;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #777;
            color: white;
        }

        /* Applying the yellow background to specific rows */
        .yellow-row {
            background-color: yellow;
        }

        /* --- Fixed Div Styling --- */
        .fixed-box {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            border: 3px solid #76b041; /* Green border */
            padding: 10px;
            background-color: white;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Firstname</th>
                <th>Lastname</th>
            </tr>
        </thead>
        <tbody>
            <tr class="yellow-row">
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>2</td>
                <td>2</td>
            </tr>
            <tr class="yellow-row">
                <td>3</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>

    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
