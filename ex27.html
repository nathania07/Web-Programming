<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout Exercise</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #58b9ff; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 800px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Top Box (Green) */
        .header-box {
            background-color: #a3cf52;
            min-height: 120px;
            border-radius: 8px;
            width: 100%;
        }

        /* Middle Section (Teal/Blue) */
        .middle-container {
            display: flex;
            flex-direction: row; /* Desktop side-by-side */
            gap: 15px;
            width: 100%;
        }

        .teal-box {
            background-color: #00bcd4;
            min-height: 150px; /* Fixed height for desktop */
            flex: 1;
            border-radius: 8px;
        }

        /* Bottom Section (Gray) */
        .bottom-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 boxes on desktop */
            gap: 15px;
            width: 100%;
        }

        .gray-box {
            background-color: #e9ecef;
            min-height: 60px;
            border-radius: 4px;
        }

        /* --- MOBILE LAYOUT (< 480px) --- */
        @media (max-width: 480px) {
            .middle-container {
                display: flex;
                flex-direction: column; /* Stack them! */
                gap: 10px;
            }

            .teal-box {
                /* IMPORTANT: Adding width and height for mobile visibility */
                width: 100% !important; 
                min-height: 50px !important; 
                display: block !important;
            }

            .bottom-container {
                grid-template-columns: repeat(2, 1fr); /* 2x2 grid */
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-box"></div>

        <div class="middle-container">
            <div class="teal-box"></div>
            <div class="teal-box"></div>
            <div class="teal-box"></div>
        </div>

        <div class="bottom-container">
            <div class="gray-box"></div>
            <div class="gray-box"></div>
            <div class="gray-box"></div>
            <div class="gray-box"></div>
        </div>
    </div>

</body>
</html>
