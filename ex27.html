<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout Fix</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #58b9ff; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 800px; /* Slightly wider for desktop */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Top Box (Green) */
        .header-box {
            background-color: #a3cf52;
            height: 120px;
            border-radius: 8px;
        }

        /* Middle Section (Teal) */
        .middle-container {
            display: flex;
            flex-direction: row; 
            gap: 15px;
        }

        .teal-box {
            background-color: #00bcd4;
            height: 150px;
            flex: 1;
            border-radius: 8px;
        }

        /* Bottom Section (Gray) */
        .bottom-container {
            display: grid;
            /* Force 4 equal columns on desktop */
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px;
        }

        .gray-box {
            background-color: #e9ecef;
            height: 60px;
            border-radius: 4px;
            width: 100%; /* Ensures it fills its grid cell */
        }

        /* --- MOBILE LAYOUT (< 480px) --- */
        @media (max-width: 480px) {
            .middle-container {
                flex-direction: column; 
            }

            .teal-box {
                height: 60px; 
            }

            .bottom-container {
                /* 2x2 Grid for mobile */
                grid-template-columns: repeat(2, 1fr); 
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-box"></div>

        <div class="middle-container">
            <div class="teal-box"></div>
            <div class="teal-box"></div>
            <div class="teal-box"></div>
        </div>

        <div class="bottom-container">
            <div class="gray-box"></div>
            <div class="gray-box"></div>
            <div class="gray-box"></div>
            <div class="gray-box"></div>
        </div>
    </div>

</body>
</html>
