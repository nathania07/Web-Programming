<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Image Styling Practice</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 90%;
        }

        /* The two side images */
        .image-outer {
            width: 33%;
            height: 300px;
        }

        /* Left: No distortion (cover) */
        .img-left {
            width: 100%;
            height: 100%;
            border-radius: 18px;
            object-fit: cover; 
        }

        /* Center: Circle */
        .img-center {
            width: 150px;
            height: 150px;
            border-radius: 50%; 
            border: 2px solid black;
            object-fit: cover;
            flex-shrink: 0;
        }

        /* Right: Sharp corners + Distortion */
        .img-right {
            width: 100%;
            height: 100%;
            /* No object-fit here makes it stretch/distort */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="image-outer">
            <img src="https://picsum.photos/id/1011/600/800" class="img-left">
        </div>

        <img src="https://picsum.photos/id/1015/150/150" class="img-center">

        <div class="image-outer">
            <img src="https://picsum.photos/id/1011/600/800" class="img-right">
        </div>
    </div>

</body>
</html>
