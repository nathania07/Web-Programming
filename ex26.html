<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Image Styling Final</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: white;
        }

        .container {
            display: flex;
            align-items: center; /* Vertically centers the circle between the big images */
            justify-content: center;
            gap: 20px;
            width: 95%;
        }

        /* LEFT IMAGE */
        .img-left {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover; /* Keeps it from distorting */
        }

        /* MIDDLE IMAGE */
        .img-middle {
            width: 150px;
            height: 150px;
            border-radius: 150px; /* Makes it round */
            border: 2px solid black;
            object-fit: cover;
            flex-shrink: 0; /* Prevents the layout from squeezing the circle */
        }

        /* RIGHT IMAGE */
        .img-right {
            width: 33%;
            height: 300px;
            /* No object-fit here = Distortion happens! */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://picsum.photos/id/13/800/800" class="img-left">
        <img src="https://picsum.photos/id/10/300/300" class="img-middle">
        <img src="https://picsum.photos/id/13/800/800" class="img-right">
    </div>

</body>
</html>
