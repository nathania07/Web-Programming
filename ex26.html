<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Image Styling</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        /* 1. Left Image: 33% width, 300px height, No Distortion, 18px Radius */
        .img-left {
            width: 33%;
            height: 300px;
            border-radius: 18px;
            object-fit: cover; /* Prevents distortion */
        }

        /* 2. Middle Image: 150px Round with Border */
        .img-middle {
            width: 150px;
            height: 150px;
            border-radius: 150px; /* Fully round */
            border: 2px solid #000000;
            object-fit: cover;
            flex-shrink: 0; /* Keeps it from squishing */
        }

        /* 3. Right Image: 33% width, 300px height, WITH Distortion */
        .img-right {
            width: 33%;
            height: 300px;
            /* No object-fit here! This causes the distortion */
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://picsum.photos/id/13/800/800" alt="Left Image" class="img-left">

        <img src="https://picsum.photos/id/10/300/300" alt="Middle Image" class="img-middle">

        <img src="https://picsum.photos/id/13/800/800" alt="Right Image" class="img-right">
    </div>

</body>
</html>
