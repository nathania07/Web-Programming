<!DOCTYPEhtml>
<html>
<head>
<style>
    * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 800px;
            background: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .section {
            padding: 60px 40px;
            text-align: center;
        }

        .section:first-child {
            background: #2c3e50;
            border-bottom: 8px solid #e74c3c;
        }

        .section:first-child h1 {
            color: white;
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 3px;
        }

        .section:last-child {
            background: #ecf0f1;
            border-top: 1px solid #bdc3c7;
        }

        .section:last-child h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            border: 3px solid #e74c3c;
            display: inline-block;
            padding: 15px 30px;
            background: white;
            border-radius: 50px;
        }

        .note {
            margin-top: 25px;
            font-style: italic;
            color: #7f8c8d;
        }

        hr {
            width: 50px;
            margin: 20px auto;
            border: none;
            height: 2px;
            background: #e74c3c;
        }
</style>  
</head>
<body>
   <div class="main-container">
        <div class="section">
            <h1>Hello World</h1>
        </div>
        
        <div class="section">
            <h1>Hello World</h1>
            <hr>
            <div class="note">— with styled borders —</div>
        </div>
    </div>
</body>  
</html>
