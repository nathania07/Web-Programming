<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .container {
            background-color: white;
            padding: 20px 40px;
            border: 1px solid #ccc;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.2); /* Creates that soft outer glow/shadow */
            width: 500px;
        }

        h1 {
            font-size: 2.5em;
            text-decoration: overline;
            /* Creates the pink/red shadow effect */
            text-shadow: 2px 2px 0px #ffb6c1; 
            margin-bottom: 20px;
        }

        h2 {
            font-style: italic;
            border: 2px solid yellow;
            padding: 5px;
            font-weight: normal;
        }

        h3 {
            text-align: right;
            text-decoration: underline;
            font-size: 1.2em;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>This is heading 1</h1>
        
        <h2>This is heading 2</h2>
        
        <h3>This is heading 3</h3>
    </div>

</body>
</html>
