<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Top-Right Button</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        :root {
            --btn-height: 22px;
            --btn-radius: 8px;
            --text-main: #2f2f2f;
            --bg-gray: #f6f6f6;
        }

        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f0f0f0;
        }

        /* 1. This container is the anchor for the button */
        .card {
            width: 496px;
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
            position: relative; /* CRITICAL: This keeps the button inside the box */
        }

        /* 2. The image area */
        .image-container {
            width: 450px;
            height: 240px;
            background: url('https://picsum.photos/id/11/450/240') center/cover;
            margin: 0 auto;
            border: 1px solid #eee;
        }

        /* 3. The Button - Forced to Top Right */
        .spec-button {
            position: absolute;
            top: 35px;    /* Matches the '35' redline in your image */
            right: 35px;  /* Moves it to the top-right corner */
            height: var(--btn-height);
            border-radius: var(--btn-radius);
            background: #ffffff;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            font-size: 13px;
            padding: 0 10px;
            cursor: pointer;
            z-index: 100; /* Makes sure it stays on top of the image */
        }

        .spec-button:hover {
            background-color: #f9f9f9;
        }

        /* 4. Information Box */
        #info-panel {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: var(--bg-gray);
            border-top: 1px solid #eaeaea;
            font-size: 13px;
            color: #707070;
            line-height: 1.6;
        }

        .show {
            display: block !important;
        }
    </style>
</head>
<body>

<div class="card">
    <button class="spec-button" onclick="toggleInfo()">查看資訊</button>

    <div class="image-container"></div>

    <div id="info-panel">
        <strong>Detailed Information:</strong><br>
        修改日期: 2017/10/12<br>
        類型: JPG<br>
        大小: 466.97KB<br>
        路徑: \\designcenter.qnap.com.tw\DesignCenter\PM-RD\WEB\Stations\A_Image2PDF\v2\sample
    </div>
</div>

<script>
    function toggleInfo() {
        const info = document.getElementById('info-panel');
        info.classList.toggle('show');
    }
</script>

</body>
</html>
