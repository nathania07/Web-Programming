<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Scrollbox Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        :root {
            --btn-height: 22px;
            --btn-radius: 8px;
            --text-main: #2f2f2f;
            --text-secondary: #707070;
            --bg-gray: #f6f6f6;
            --border-color: #eaeaea;
        }

        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f0f0f0;
        }

        .card {
            width: 496px;
            background: white;
            padding: 15px 20px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 5px;
        }

        .preview-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .spec-button {
            height: var(--btn-height);
            border-radius: var(--btn-radius);
            background: #ffffff;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            font-size: 11px;
            padding: 0 12px;
            cursor: pointer;
            z-index: 20;
        }

        /* The viewport container */
        .viewport {
            width: 450px;
            margin: 0 auto;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            overflow: hidden; /* Hide scrollbar initially */
        }

        /* This class is added via JavaScript when button is clicked */
        .viewport.is-scrolling {
            height: 350px; /* Fixed height to force scrolling */
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .image-display {
            width: 100%;
            /* A tall image ensures there is something to scroll through */
            height: 500px; 
            background: url('https://picsum.photos/id/11/450/600') center/top no-repeat;
            background-size: cover;
        }

        #info-panel {
            display: none;
            padding: 15px;
            background-color: var(--bg-gray);
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }

        .show {
            display: block !important;
        }

        /* Custom Scrollbar styling */
        .viewport::-webkit-scrollbar {
            width: 6px;
        }
        .viewport::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-row">
        <span class="preview-label">預覽</span>
        <button class="spec-button" onclick="activateScrollMode()">查看資訊</button>
    </div>

    <div class="viewport" id="mainViewport">
        <div class="image-display"></div>
        
        <div id="info-panel">
            <strong>Detailed Information:</strong><br>
            修改日期: 2017/10/12<br>
            類型: JPG<br>
            大小: 466.97KB<br>
            路徑: \\designcenter.qnap.com.tw\DesignCenter\PM-RD\WEB\Stations\A_Image2PDF\v2\sample
        </div>
    </div>
</div>

<script>
    function activateScrollMode() {
        const viewport = document.getElementById('mainViewport');
        const info = document.getElementById('info-panel');
        
        // Toggle the scrolling state
        viewport.classList.toggle('is-scrolling');
        info.classList.toggle('show');

        // Scroll to the bottom to show information immediately
        if (viewport.classList.contains('is-scrolling')) {
            setTimeout(() => {
                viewport.scrollTo({
                    top: viewport.scrollHeight,
                    behavior: 'smooth'
                });
            }, 100);
        }
    }
</script>

</body>
</html>
