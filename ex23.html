<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrollable Info Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        :root {
            --btn-height: 22px;
            --btn-radius: 8px;
            --text-main: #2f2f2f;
            --text-secondary: #707070;
            --bg-gray: #f6f6f6;
            --border-color: #eaeaea;
        }

        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f0f0f0;
        }

        .card {
            width: 496px;
            background: white;
            padding: 15px 20px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 5px;
        }

        .preview-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .spec-button {
            height: var(--btn-height);
            border-radius: var(--btn-radius);
            background: #ffffff;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            font-size: 13px;
            padding: 0 12px;
            cursor: pointer;
        }

        .image-display {
            width: 450px;
            height: 240px;
            background: url('https://picsum.photos/id/11/450/240') center/cover;
            margin: 0 auto;
            border: 1px solid #eee;
        }

        /* The Scrollable Info Panel */
        #info-panel {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background-color: var(--bg-gray);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.8;
            
            /* SCROLLBOX SETTINGS */
            max-height: 120px;    /* Limits the height */
            overflow-y: auto;     /* Adds scrollbar if content is taller than max-height */
        }

        /* Optional: Style the scrollbar to look cleaner */
        #info-panel::-webkit-scrollbar {
            width: 6px;
        }
        #info-panel::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        .show {
            display: block !important;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-row">
        <span class="preview-label">預覽</span>
        <button class="spec-button" onclick="toggleInfo()">查看資訊</button>
    </div>

    <div class="image-display"></div>

    <div id="info-panel">
        <strong>Detailed Information:</strong><br>
        修改日期: 2017/10/12<br>
        類型: JPG<br>
        大小: 466.97KB<br>
        路徑: \\designcenter.qnap.com.tw\DesignCenter\PM-RD\WEB\Stations\A_Image2PDF\v2\sample<br>
        解析度: 450 x 240 px<br>
        相機: Canon EOS 5D Mark IV<br>
        曝光時間: 1/100 sec<br>
        ISO: 200<br>
        光圈: f/8.0
    </div>
</div>

<script>
    function toggleInfo() {
        const info = document.getElementById('info-panel');
        info.classList.toggle('show');
    }
</script>

</body>
</html>
