<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Detail View</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        :root {
            --btn-height: 22px;
            --btn-radius: 8px;
            --text-main: #2f2f2f;
            --text-secondary: #707070;
            --border-color: #eaeaea;
            --bg-gray: #f6f6f6;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container {
            width: 496px;
            background: #ffffff;
            padding: 20px;
            border: 1px solid #ddd;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* The single image based on your request */
        .image-display {
            width: 450px;
            height: 240px;
            background: url('https://picsum.photos/450/240?lake') center/cover;
            margin: 0 auto 15px;
            border-radius: 2px;
        }

        .button-container {
            display: flex;
            justify-content: flex-end; /* Aligns button to the right */
            margin-bottom: 20px;
            padding-right: 23px;
        }

        .spec-button {
            height: var(--btn-height);
            border-radius: var(--btn-radius);
            background: #fff;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            font-size: 13px;
            padding: 0 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .spec-button:hover {
            background-color: #f0f0f0;
        }

        /* The information box (hidden by default) */
        #info-panel {
            display: none;
            padding: 15px;
            background-color: var(--bg-gray);
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.8;
        }

        .show {
            display: block !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="image-display"></div>

    <div class="button-container">
        <button class="spec-button" onclick="toggleInfo()">查看資訊</button>
    </div>

    <div id="info-panel">
        <strong>Detailed Information:</strong><br>
        修改日期: 2017/10/12<br>
        類型: JPG<br>
        大小: 466.97KB<br>
        路徑: \\designcenter.qnap.com.tw\DesignCenter\PM-RD\WEB\Stations\A_Image2PDF\v2\sample
    </div>
</div>

<script>
    function toggleInfo() {
        const info = document.getElementById('info-panel');
        // Toggle visibility
        if (info.classList.contains('show')) {
            info.classList.remove('show');
        } else {
            info.classList.add('show');
        }
    }
</script>

</body>
</html>
