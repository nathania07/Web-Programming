<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrollable Content Area</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        :root {
            --btn-height: 22px;
            --btn-radius: 8px;
            --text-main: #2f2f2f;
            --text-secondary: #707070;
            --bg-gray: #f6f6f6;
            --border-color: #eaeaea;
        }

        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f0f0f0;
        }

        .card {
            width: 496px;
            background: white;
            padding: 15px 20px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Header remains fixed at the top */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 5px;
        }

        .preview-label {
            font-size: 13px;
            font-weight: bold;
            color: var(--text-main);
        }

        .spec-button {
            height: var(--btn-height);
            border-radius: var(--btn-radius);
            background: #ffffff;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            font-size: 11px;
            padding: 0 10px;
            cursor: pointer;
        }

        /* NEW: The Scrollable Wrapper */
        .scroll-viewport {
            width: 100%;
            height: 300px; /* Fixed height for the viewing area */
            overflow-y: auto; /* Enables vertical scrolling */
            border: 1px solid var(--border-color);
        }

        /* The tall content inside the scrollbox */
        .image-display {
            width: 100%;
            height: 600px; /* Made very tall to demonstrate scrolling */
            background: url('https://picsum.photos/450/800') center/cover;
        }

        #info-panel {
            display: none; /* Hidden until button is pressed */
            padding: 15px;
            background-color: var(--bg-gray);
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.8;
            border-top: 1px solid var(--border-color);
        }

        .show {
            display: block !important;
        }

        /* Custom Scrollbar */
        .scroll-viewport::-webkit-scrollbar {
            width: 8px;
        }
        .scroll-viewport::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-row">
        <span class="preview-label">預覽</span>
        <button class="spec-button" onclick="toggleInfo()">查看資訊</button>
    </div>

    <div class="scroll-viewport">
        <div class="image-display"></div>
        
        <div id="info-panel">
            <strong>Detailed Information:</strong><br>
