<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designer Spec Button</title>
    <style>
        /* CSS variables based on the designer's redlines */
        :root {
            --btn-height: 22px;
            --btn-radius: 8px;
            --btn-bg: #ffffff;
            --btn-outline: #2f2f2f;
            --text-color: #2f2f2f;
            --font-main: 'Roboto', sans-serif;
        }

        body {
            font-family: var(--font-main), Arial, sans-serif;
            padding: 40px;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 496px; /* Based on the blue dimension line in the image */
            background: white;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        .image-placeholder {
            width: 450px;
            height: 240px;
            background: #ddd url('https://via.placeholder.com/450x240') center/cover;
            margin: 0 auto 20px;
        }

        /* The Button based on the circled specs */
        .spec-button {
            height: var(--btn-height);
            border-radius: var(--btn-radius);
            background-color: var(--btn-bg);
            border: 1px solid var(--btn-outline);
            color: var(--text-color);
            font-size: 13px;
            padding: 0 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .spec-button:hover {
            background-color: #f0f0f0;
        }

        /* Hidden detailed information section */
        #details {
            margin-top: 20px;
            padding: 15px;
            background-color: #f6f6f6; /* Matching header bg color in notes */
            border-top: 1px solid #eaeaea;
            display: none;
            text-align: left;
            font-size: 13px;
            color: #707070;
        }

        .show {
            display: block !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="image-placeholder"></div>
        
        <button class="spec-button" onclick="toggleDetails()">
            查看資訊
        </button>

        <div id="details">
            <strong>Detailed Information:</strong><br>
            Date: 2017/10/12<br>
            Type: JPG<br>
            Size: 466.97KB<br>
            Path: \\designcenter.qnap.com.tw\...
        </div>
    </div>

    <script>
        function toggleDetails() {
            const details = document.getElementById('details');
            details.classList.toggle('show');
        }
    </script>

</body>
</html>
