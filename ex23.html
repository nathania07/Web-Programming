<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aligned Header Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        :root {
            --btn-height: 22px;
            --btn-radius: 8px;
            --text-main: #2f2f2f;
            --text-secondary: #707070;
            --bg-gray: #f6f6f6;
        }

        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f0f0f0;
        }

        .card {
            width: 496px;
            background: white;
            padding: 15px 20px; /* Reduced top padding to move header up */
            border: 1px solid #ddd;
        }

        /* The Header Row for Preview and Button */
        .header-row {
            display: flex;
            justify-content: space-between; /* Pushes content to far left and far right */
            align-items: center;
            margin-bottom: 10px; /* Space between header and image */
            padding: 0 5px;
        }

        .preview-label {
            font-size: 13px;
            color: #707070; /* Matching the designer's secondary text color */
        }

        .spec-button {
            height: var(--btn-height);
            border-radius: var(--btn-radius);
            background: #ffffff;
            border: 1px solid var(--text-main);
            color: var(--text-main);
            font-size: 13px;
            padding: 0 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .spec-button:hover {
            background-color: #f9f9f9;
        }

        /* Image Display - No longer absolute, it stays in the flow */
        .image-display {
            width: 450px;
            height: 240px;
            background: url('https://picsum.photos/id/11/450/240') center/cover;
            margin: 0 auto;
            border: 1px solid #eee;
        }

        /* Information Section */
        #info-panel {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background-color: var(--bg-gray);
            border-top: 1px solid #eaeaea;
            font-size: 13px;
            color: #707070;
            line-height: 1.6;
        }

        .show {
            display: block !important;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-row">
        <span class="preview-label">預覽</span>
        <button class="spec-button" onclick="toggleInfo()">查看資訊</button>
    </div>

    <div class="image-display"></div>

    <div id="info-panel">
        <strong>Detailed Information:</strong><br>
        修改日期: 2017/10/12<br>
        類型: JPG<br>
        大小: 466.97KB<br>
        路徑: \\designcenter.qnap.com.tw\DesignCenter\PM-RD\WEB\Stations\A_Image2PDF\v2\sample
    </div>
</div>

<script>
    function toggleInfo() {
        const info = document.getElementById('info-panel');
        info.classList.toggle('show');
    }
</script>

</body>
</html>
