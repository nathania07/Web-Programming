<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Object Manipulation</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; }
        .output { background: #f4f4f4; padding: 10px; border-radius: 5px; font-family: monospace; }
        h3 { color: #333; }
    </style>
</head>
<body>

    <h2>Object Manipulation Results</h2>

    <h3>1. All Properties:</h3>
    <div id="propList" class="output"></div>

    <h3>2. Object after deleting 'age':</h3>
    <div id="finalObject" class="output"></div>

    <script>
        // The Sample Object
        var Person = {
            firstName : "Tony",
            lastName : "Lee",
            age : 50,
            eyeColor : "Blue"
        };

        // 1. List all properties
        // Object.keys returns an array of the object's property names
        var properties = Object.keys(Person);
        document.getElementById("propList").innerText = properties.join(", ");

        // 2. Delete the age property
        delete Person.age;

        // 3. Print the object after deletion
        // JSON.stringify converts the object to a readable string
        document.getElementById("finalObject").innerText = JSON.stringify(Person, null, 4);
        
        // Log to console as well
        console.log("Remaining Properties:", Object.keys(Person));
        console.log("Updated Object:", Person);
    </script>
</body>
</html>
